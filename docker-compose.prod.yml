services:
  nginx:
    image: nginx:1.27-alpine
    container_name: qdata-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qdata-backend
    expose:
      - "8000"
    environment:
      QDATA_DATABASE_URL: postgresql+asyncpg://qdata:${DB_PASS}@postgres:5432/qdata
      QDATA_REDIS_URL: redis://redis:6379/0
      QDATA_JWT_SECRET: ${JWT_SECRET}
      QDATA_SMTP_HOST: ${SMTP_HOST}
      QDATA_SMTP_PORT: ${SMTP_PORT}
      QDATA_SMTP_USER: ${SMTP_USER}
      QDATA_SMTP_PASS: ${SMTP_PASS}
      QDATA_ENV: production
    restart: unless-stopped
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qdata-frontend
    expose:
      - "80"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: qdata-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: qdata
      POSTGRES_USER: qdata
      POSTGRES_PASSWORD: ${DB_PASS}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qdata"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qdata-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
